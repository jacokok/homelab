---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  chart:
    spec:
      chart: cert-manager
      version: "1.20.x"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
      interval: 12h
  chartRef:
    kind: OCIRepository
    name: cert-manager
    namespace: cert-manager
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  interval: 1h0m0s
  values:
    crds:
      enabled: true
      keep: true
    replicaCount: 1
