---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-release
  namespace: cert-manager
spec:
  values:
    installCRDs: true
  chartRef:
    kind: OCIRepository
    name: cert-manager-repo
    namespace: cert-manager
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  interval: 1h0m0s
