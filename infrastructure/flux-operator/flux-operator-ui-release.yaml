kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: flux-operator
      version: ">=0.30.0" # Targets Flux 2.8+ compatible versions
      sourceRef:
        kind: HelmRepository
        name: flux-operator
        namespace: flux-system
