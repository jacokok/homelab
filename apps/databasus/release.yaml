---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: databasus
  namespace: databasus
spec:
  chart:
    spec:
      chart: databasus
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: databasus-repo
      version: 3.x
  values:
    extraEnv:
      - name: TZ
        value: Africa/Johannesburg

    persistence:
      size: 10Gi
      storageClassName: longhorn

    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "500m"

    serviceAccount:
      automountServiceAccountToken: false

    # Disabled temporarily: the health endpoint returns 503 until a
    # verification agent checks in, but the agent can't download its
    # binary until the service has endpoints (chicken-and-egg loop).
    # readinessProbe:
    #   initialDelaySeconds: 10
    #   periodSeconds: 10
    #   failureThreshold: 5

    # Also relax liveness so the pod doesn't get killed while the
    # initial agent connects
    livenessProbe:
      initialDelaySeconds: 600
      periodSeconds: 30
      failureThreshold: 30

  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
    force: true
  interval: 1h0m0s
  timeout: 15m
