---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: databasus
  namespace: databasus
spec:
  chart:
    spec:
      chart: databasus
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: databasus-repo
      version: 3.x
  values:
    extraEnv:
      - name: TZ
        value: Africa/Johannesburg

    persistence:
      size: 10Gi
      storageClassName: longhorn

    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "500m"

    serviceAccount:
      automountServiceAccountToken: false

    # Disabled health checks to break chicken-and-egg loop:
    # health endpoint returns 503 until an agent checks in,
    # but the agent can't download until the service has endpoints.
    # Re-enable once the agent connects successfully.
    readinessProbe:
      exec:
        command: ["true"]
    livenessProbe:
      exec:
        command: ["true"]

  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
    force: true
  interval: 1h0m0s
  timeout: 15m
