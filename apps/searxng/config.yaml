apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
data:
  settings.yml: |
    server:
      # secret_key: "changeme"  # Override with SEARXNG_SECRET env var
      bind_address: "0.0.0.0"
      port: 8080
    search:
      formats:
        - html
        - json
    engines:
      - name: google
        engine: google
        shortcut: go
        disabled: false
      - name: bing
        engine: bing
        shortcut: bi
        disabled: false
      - name: duckduckgo
        engine: duckduckgo
        shortcut: ddg
        disabled: false
