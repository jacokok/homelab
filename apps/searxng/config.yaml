apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
data:
  settings.yml: |
    server:
      # secret_key set via SEARXNG_SECRET env var
      bind_address: "0.0.0.0"
      port: 8080
    search:
      formats:
        - html
        - json
    doi_resolvers:
      oadoi.org: 'https://oadoi.org/'
      doi.org: 'https://doi.org/'
      sci-hub.se: 'https://sci-hub.se/'
      sci-hub.st: 'https://sci-hub.st/'
      sci-hub.ru: 'https://sci-hub.ru/'

    default_doi_resolver: 'oadoi.org'

    engines:
      - name: google
        engine: google
        shortcut: go
        disabled: false
      - name: bing
        engine: bing
        shortcut: bi
        disabled: false
      - name: duckduckgo
        engine: duckduckgo
        shortcut: ddg
        disabled: false
