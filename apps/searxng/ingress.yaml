apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: searxng
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`searxng.doink.co.za`)
      middlewares:
        - name: searxng-auth
      services:
        - name: searxng
          port: 8080
  tls:
    secretName: searxng-tls
