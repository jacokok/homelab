apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: searxng-auth
  namespace: searxng
spec:
  basicAuth:
    secret: searxng-auth-secret
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: searxng-ipwhitelist
  namespace: searxng
spec:
  ipAllowList:
    sourceRange:
      - "192.168.1.0/24"
