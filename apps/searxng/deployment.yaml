apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: docker.io/searxng/searxng:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - mountPath: /etc/searxng
              name: searxng-config
            - mountPath: /var/cache/searxng
              name: searxng-data
          env:
            - name: SEARXNG_PORT
              value: "8080"
            - name: SEARXNG_VALKEY_URL
              value: redis://localhost:6379/0
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-secret
                  key: SEARXNG_SECRET
        - name: valkey
          image: docker.io/valkey/valkey:8
          ports:
            - containerPort: 6379
          volumeMounts:
            - mountPath: /data
              name: valkey-data
          args:
            - --save
            - "60"
            - "1"
            - --loglevel
            - warning
      restartPolicy: Always
      volumes:
        - name: searxng-config
          configMap:
            name: searxng-config
        - name: valkey-data
          persistentVolumeClaim:
            claimName: valkey-data
        - name: searxng-data
          persistentVolumeClaim:
            claimName: searxng-data
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
spec:
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
