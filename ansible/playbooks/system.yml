---
# System update, base packages, and iscsid (needed by longhorn).
# Covers TODO: "Ansible update" and "Ansible install packages".

- name: Update apt and install common packages
  hosts: all
  become: true
  tasks:
    - name: Run apt update && upgrade
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
      when: ansible_facts['os_family'] == 'Debian'

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

    - name: Enable and start iscsid (for longhorn)
      ansible.builtin.systemd:
        name: iscsid
        enabled: true
        state: started

    - name: Load dm_crypt kernel module (required by longhorn)
      ansible.builtin.command:
        cmd: modprobe dm_crypt
        creates: /sys/module/dm_crypt

    - name: Ensure dm_crypt loads on boot
      ansible.builtin.copy:
        content: dm_crypt
        dest: /etc/modules-load.d/dm_crypt.conf
        mode: "0644"
