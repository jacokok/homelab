---
# Configure /etc/rancher/k3s/registries.yaml for private registry auth.
# Covers TODO: "Ansible setup registries.yaml".
#
# Put real credentials in a vault-encrypted variable, e.g. group_vars/vault.yml:
#   ansible-vault edit group_vars/vault.yml
# and reference them here instead of hardcoding.

- name: Configure container registry authentication
  hosts: k3s_cluster
  become: true
  vars:
    registry_host: index.docker.io
    registry_username: "REPLACE_ME"
    registry_password: "REPLACE_ME"
  tasks:
    - name: Ensure k3s config directory exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        mode: "0755"

    - name: Write registries.yaml
      ansible.builtin.copy:
        dest: /etc/rancher/k3s/registries.yaml
        mode: "0600"
        content: |
          configs:
            "{{ registry_host }}":
              auth:
                username: "{{ registry_username }}"
                password: "{{ registry_password }}"
      no_log: true

    - name: Restart k3s to apply registry config
      ansible.builtin.systemd:
        name: "{{ 'k3s' if inventory_hostname in groups['k3s_masters'] else 'k3s-agent' }}"
        state: restarted
