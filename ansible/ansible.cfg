[defaults]
# Run from the ansible/ directory so relative paths (inventory, group_vars) resolve
host_key_checking = False
inventory = inventory.yml
roles_path = roles
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .facts
fact_caching_timeout = 86400
interpreter_python = auto_silent

[ssh_connection]
# Persist the control connection to speed up repeated SSH connections
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
